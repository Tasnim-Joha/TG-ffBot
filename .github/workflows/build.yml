name: Build and Package

on:
  push:
    branches: [ master ]  # triggers on push to master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18  # use your project's Node version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build  # assumes you have a "build" script in package.json that runs tsc

      - name: Install production dependencies only (for deployment)
        run: |
          rm -rf node_modules
          npm ci --only=production

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          # optionally copy other necessary files (e.g., .env.example, public folder, etc.)
          # cp .env.example deploy/   # if you have an example env file

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-production
          path: deploy/
